configurations:
  -
    host: imap.gmail.com
    port: 993
    tls: true
    tlsOptions:
      rejectUnauthorized: true
    usernameCMD: 'cat ~/.mail/personal-username'
    passwordCMD: 'pass $(cat ~/.mail/personal-username) | head -n1'
    onNewMail: 'systemctl --user start syncmail@personal'
    boxes:
      -
        mailbox: INBOX

  -
    host: imap.gmail.com
    port: 993
    tls: true
    tlsOptions:
      rejectUnauthorized: true
    usernameCMD: 'cat ~/.mail/upmail-username'
    passwordCMD: 'pass $(cat ~/.mail/upmail-username) | head -n1'
    onNewMail: 'systemctl --user start syncmail@upmail'
    boxes:
      -
        mailbox: INBOX
